services:
  - type: web
    name: autentica-o-back-end
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    disk:
      name: auth-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATA_DIR
        value: /var/data
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 7
      - key: JWT_SECRET
        generateValue: true
